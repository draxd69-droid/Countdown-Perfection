<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown - September 22, 2026</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .date {
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .countdown {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
        }

        .number {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .label {
            margin-top: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .expired {
            font-size: 2rem;
            color: #ffcc00;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Countdown</h1>
    <div class="date">Deadline: September 22, 2026 - 5:00 PM</div>

    <div id="countdown" class="countdown">
        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">Days</div>
        </div>

        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">Hours</div>
        </div>

        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutes</div>
        </div>

        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">Seconds</div>
        </div>
    </div>
</div>

<script>
    const targetDate = new Date(2026, 8, 22, 17, 0, 0); // September = 8

    function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) {
            document.getElementById("countdown").innerHTML =
                '<div class="expired">Time is up!</div>';
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").textContent = days;
        document.getElementById("hours").textContent = hours.toString().padStart(2, "0");
        document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
        document.getElementById("seconds").textContent = seconds.toString().padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

</body>
</html>
